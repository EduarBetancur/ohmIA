<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Resistencias en paralelo</title>
  <desc id="desc">Tres resistencias conectadas en ramas paralelas.</desc>
  <rect width="900" height="520" fill="#f8fafc"/>
  <text x="450" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#102a43">Resistencias en paralelo</text>
  <line x1="210" y1="150" x2="210" y2="380" stroke="#1d4f8f" stroke-width="10"/>
  <line x1="690" y1="150" x2="690" y2="380" stroke="#1d4f8f" stroke-width="10"/>
  <line x1="210" y1="170" x2="350" y2="170" stroke="#1d4f8f" stroke-width="10"/>
  <rect x="350" y="135" width="200" height="70" fill="#ffffff" stroke="#6a4c93" stroke-width="8"/>
  <line x1="550" y1="170" x2="690" y2="170" stroke="#1d4f8f" stroke-width="10"/>
  <line x1="210" y1="265" x2="350" y2="265" stroke="#1d4f8f" stroke-width="10"/>
  <rect x="350" y="230" width="200" height="70" fill="#ffffff" stroke="#6a4c93" stroke-width="8"/>
  <line x1="550" y1="265" x2="690" y2="265" stroke="#1d4f8f" stroke-width="10"/>
  <line x1="210" y1="360" x2="350" y2="360" stroke="#1d4f8f" stroke-width="10"/>
  <rect x="350" y="325" width="200" height="70" fill="#ffffff" stroke="#6a4c93" stroke-width="8"/>
  <line x1="550" y1="360" x2="690" y2="360" stroke="#1d4f8f" stroke-width="10"/>
  <text x="450" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#6a4c93">R1</text>
  <text x="450" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#6a4c93">R2</text>
  <text x="450" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#6a4c93">R3</text>
  <text x="450" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#102a43">1/Req = 1/R1 + 1/R2 + 1/R3</text>
</svg>
