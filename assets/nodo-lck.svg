<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Ley de corrientes de Kirchhoff</title>
  <desc id="desc">Corrientes que entran y salen de un nodo.</desc>
  <rect width="900" height="520" fill="#f8fafc"/>
  <text x="450" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#102a43">LCK: corrientes en un nodo</text>
  <circle cx="450" cy="270" r="42" fill="#1d4f8f"/>
  <text x="450" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff">Nodo</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#e4572e"/>
    </marker>
  </defs>
  <line x1="120" y1="170" x2="410" y2="250" stroke="#e4572e" stroke-width="10" marker-end="url(#arrow)"/>
  <line x1="150" y1="360" x2="412" y2="286" stroke="#e4572e" stroke-width="10" marker-end="url(#arrow)"/>
  <line x1="490" y1="250" x2="780" y2="170" stroke="#2e7d32" stroke-width="10" marker-end="url(#arrow)"/>
  <line x1="488" y1="286" x2="750" y2="360" stroke="#2e7d32" stroke-width="10" marker-end="url(#arrow)"/>
  <text x="170" y="135" font-family="Arial, sans-serif" font-size="30" fill="#e4572e">I1 entra</text>
  <text x="160" y="410" font-family="Arial, sans-serif" font-size="30" fill="#e4572e">I2 entra</text>
  <text x="650" y="135" font-family="Arial, sans-serif" font-size="30" fill="#2e7d32">I3 sale</text>
  <text x="650" y="410" font-family="Arial, sans-serif" font-size="30" fill="#2e7d32">I4 sale</text>
  <text x="450" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#102a43">I1 + I2 = I3 + I4</text>
</svg>
